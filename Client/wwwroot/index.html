    <!-- Contenido para buscadores y motores de IA: el juego es WebAssembly y no

    <noscript>
        <div style="max-width:720px;margin:40px auto;padding:0 20px;font-family:system-ui,sans-serif;color:#e8eefc;">
            <h1>Once de Oro — Juego de Manager de Fútbol Online Gratis</h1>
            <p><strong>Once de Oro</strong> es un juego de manager de fútbol online y gratis. Sos el
            director técnico: fichás estrellas en el mercado, creás tu personaje, elegís la formación y
            el planteo, hacés cambios en pleno partido y disputás torneos hasta ganar la liga, la copa,
            la Champions League y la Copa del Mundo.</p>
            <h2>¿Qué podés hacer?</h2>
            <ul>
                <li>Fichar jugadores y armar tu plantel.</li>
                <li>Dirigir partidos con una cancha 2D en vivo.</li>
                <li>Jugar ligas, copas nacionales, torneos continentales y el Mundial.</li>
                <li>Crear tu propio personaje (director técnico) al estilo Sims/Dark Souls.</li>
                <li>Desbloquear logros estilo trofeos de PlayStation.</li>
            </ul>
            <p>Es gratis, se juega en el navegador (sin descargar nada), en la computadora y el celular,
            y está en español, inglés y portugués. Para jugar necesitás activar JavaScript.</p>
            <p>Creado por Roberth Dudiver y Alexander Dudiver.</p>
        </div>
    </noscript>
